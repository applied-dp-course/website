name: Nightly WASM smoke tests

# Full-site browser smoke suite for every exported interactive. Runs on a schedule
# instead of blocking every deploy (scoped PR smoke is the fast gate).
#
# Renders once, then shards per-app smoke across parallel runners.
#
# Required secret: CODE_BASE_DEV_CHECKOUT_TOKEN (see publish.yml).

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: read

env:
  PAGES_BASE_URL: https://applied-dp-course.github.io/website
  RENDER_CACHE_PATHS: |
    _freeze
    _generated/apps
    _generated/wheels
    _generated/animations
    _generated/interactives_src
  SMOKE_SHARD_COUNT: "4"

defaults:
  run:
    working-directory: website

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: website

      - uses: actions/checkout@v4
        with:
          repository: applied-dp-course/code_base_dev
          token: ${{ secrets.CODE_BASE_DEV_CHECKOUT_TOKEN }}
          path: code_base_dev

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: website/requirements-ci.txt

      - name: Compute render cache key
        id: render-cache
        run: |
          echo "key=$(python3 scripts/ci_render_cache_key.py key)" >> "$GITHUB_OUTPUT"
          echo "prefix=$(python3 scripts/ci_render_cache_key.py prefix)" >> "$GITHUB_OUTPUT"

      - name: Restore render cache
        uses: actions/cache/restore@v4
        with:
          path: |
            website/_freeze
            website/_generated/apps
            website/_generated/wheels
            website/_generated/animations
            website/_generated/interactives_src
          key: ${{ steps.render-cache.outputs.key }}
          restore-keys: |
            ${{ steps.render-cache.outputs.prefix }}

      - uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: "1.6.43"

      - name: Install Python dependencies
        run: |
          python -m venv .venv
          ./.venv/bin/pip install --upgrade pip
          ./.venv/bin/pip install -r requirements-ci.txt
          ./dev/tools/sync_libdpy.sh

      - name: Verify content libdpy imports resolve (fast gate before render)
        run: ./.venv/bin/python dev/tools/verify_libdpy_imports.py

      - name: Render site
        env:
          QUARTO_PYTHON: ${{ github.workspace }}/website/.venv/bin/python
          MPLBACKEND: Agg
        run: quarto render --execute

      - name: Save render cache
        if: success()
        uses: actions/cache/save@v4
        with:
          path: |
            website/_freeze
            website/_generated/apps
            website/_generated/wheels
            website/_generated/animations
            website/_generated/interactives_src
          key: ${{ steps.render-cache.outputs.key }}

      - name: Upload rendered site artifact
        uses: actions/upload-artifact@v4
        with:
          name: rendered-site
          path: |
            website/_site
            website/_generated/gallery.json
          retention-days: 2

  smoke:
    needs: render
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3]
    steps:
      - uses: actions/checkout@v4
        with:
          path: website

      - uses: actions/download-artifact@v4
        with:
          name: rendered-site
          path: website

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: website/requirements-ci.txt

      - name: Install Chrome (for WASM smoke tests)
        id: chrome
        uses: browser-actions/setup-chrome@v1
        with:
          install-dependencies: true

      - name: Install Python dependencies
        run: |
          python -m venv .venv
          ./.venv/bin/pip install --upgrade pip
          ./.venv/bin/pip install -r requirements-ci.txt
          ./dev/tools/sync_libdpy.sh

      - name: Sharded WASM and canvas browser smoke tests
        env:
          LIBDPY_CHROME: ${{ steps.chrome.outputs.chrome-path }}
          LIBDPY_HEADLESS: "0"
        run: >-
          xvfb-run -a ./.venv/bin/python tests/run_smoke_tests.py
          --shard-index ${{ matrix.shard }}
          --shard-count ${{ env.SMOKE_SHARD_COUNT }}
