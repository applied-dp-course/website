name: Publish website

# Build the Quarto site (which generates the marimo WASM interactives from libdpy),
# verify every interactive renders in headless Chrome, then deploy to GitHub Pages.
#
# libdpy is installed from the public pub_lib repo (see requirements.txt), so this
# workflow only succeeds once the interactive-widget code has been propagated there.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  PAGES_BASE_URL: https://applied-dp-course.github.io/website

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: "1.6.43"

      - name: Install Chrome (for WASM smoke tests)
        id: chrome
        uses: browser-actions/setup-chrome@v1
        with:
          install-dependencies: true

      - name: Install Python dependencies
        run: |
          python -m venv .venv
          ./.venv/bin/pip install --upgrade pip
          ./.venv/bin/pip install -r requirements.txt
          ./.venv/bin/pip install pytest websocket-client

      - name: Unit tests (before expensive WASM build)
        run: ./.venv/bin/python -m pytest tests -q

      - name: Render site (pre-render builds the libdpy wheel + WASM apps)
        env:
          QUARTO_PYTHON: ${{ github.workspace }}/.venv/bin/python
          MPLBACKEND: Agg
        run: quarto render --execute

      - name: Verify rendered routes and internal links
        run: ./.venv/bin/python scripts/check_site.py

      - name: WASM and canvas browser smoke tests
        env:
          LIBDPY_CHROME: ${{ steps.chrome.outputs.chrome-path }}
          LIBDPY_HEADLESS: "0"
        run: xvfb-run -a ./.venv/bin/python tests/run_smoke_tests.py

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  verify:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install metadata dependencies
        run: |
          python -m venv .venv
          ./.venv/bin/pip install --upgrade pip
          ./.venv/bin/pip install PyYAML

      - name: Verify deployed GitHub Pages routes
        env:
          PAGES_BASE_URL: ${{ needs.deploy.outputs.page_url || env.PAGES_BASE_URL }}
        run: ./.venv/bin/python scripts/check_site.py --base-url "$PAGES_BASE_URL"
