# Per-lecture contract (v4 §6). `status` drives the schedule table.
title: Reconstruction attacks
status: planned                      # planned | migrated | legacy-pdf  → flip to `migrated`
                                     #   only after the v4 §8 smoke tests pass on deployed Pages.
owner: "course-staff"
last_verified: ""                    # set on first successful deployed-site smoke test
verified_browsers: []                # e.g. [Chrome, Firefox, Safari]
canonical_source: lectures/02-reconstruction/notebook.ipynb

runtimes:
  slides: revealjs
  student_notebook: jupyterlite      # browser path needs the libdpy wheel (v4 §1.1)
  apps:
    - reconstruction-2d-slab         # ./apps/  (import-only entrypoints)
    - reconstruction-3d-slabs

exports:
  pdf: true
  pptx: true
  beamer: false

fallbacks:                           # generated from the notebook/app, not hand-drawn (v4 §7)
  - assets/reconstruction-error-static.png
  - assets/slab-2d-static.png
  - assets/slab-3d-static.png

# Both slots defined; keep identical until they diverge (v4 §6).
dependencies:
  host:                              # Quarto render env (GitHub Actions); installs libdpy via git+
    - quarto
    - jupyter
    - numpy
    - scipy
    - pandas
    - matplotlib
    - plotly
    - libdpy
  browser:                           # JupyterLite/marimo/Pyodide; installs the libdpy WHEEL
    - numpy
    - scipy
    - pandas
    - matplotlib
    - plotly
    - libdpy                         # hosted wheel (v4 §1.1), NOT git+

smoke_tests:                         # v4 §8
  - import libdpy
  - run lin_reg_reconstruction (small instance)
  - run lin_prog_reconstruction (small instance, method="highs")
  - interactive_2d_slab renders and responds
  - interactive_3d_slabs renders and responds

# Library state: all reconstruction modules are already public on pub_lib's origin/main
# (geometry.py, instances.py, reconstruction_lecture_visualization.py,
# reconstruction_3d_visualization.py). Remaining library-side gap is the hosted browser
# wheel for micropip (v4 §1.1) — a packaging/release task, not new code. See ../../STATUS.md.
