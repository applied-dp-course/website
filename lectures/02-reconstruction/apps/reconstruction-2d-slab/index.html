<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>2-D reconstruction slab explorer</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #1f2933;
      --muted: #5b6773;
      --line: #c8d0d8;
      --panel: #f7f9fb;
      --blue: #2b6cb0;
      --purple: #7c3aed;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background: #fff;
    }
    .app {
      display: grid;
      grid-template-columns: minmax(250px, 300px) minmax(420px, 1fr);
      gap: 18px;
      min-height: 520px;
      padding: 18px;
    }
    .controls {
      border: 1px solid var(--line);
      background: var(--panel);
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    h1 {
      margin: 0 0 4px;
      font-size: 18px;
      line-height: 1.2;
    }
    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.4;
      font-size: 13px;
    }
    label, .group-title {
      display: block;
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 6px;
    }
    select, input[type="range"] {
      width: 100%;
    }
    .query-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 7px 0;
      font-size: 14px;
    }
    .swatch {
      width: 14px;
      height: 14px;
      border: 1px solid #333;
      flex: 0 0 auto;
    }
    .readout {
      font-variant-numeric: tabular-nums;
      color: var(--blue);
      font-weight: 700;
    }
    .stage {
      min-width: 0;
      border: 1px solid var(--line);
      background: #fff;
      padding: 8px;
    }
    canvas {
      width: 100%;
      height: 500px;
      display: block;
    }
    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .stat {
      border: 1px solid var(--line);
      background: #fff;
      padding: 8px;
    }
    .stat b {
      display: block;
      font-size: 20px;
      line-height: 1.1;
      font-variant-numeric: tabular-nums;
    }
    @media (max-width: 760px) {
      .app { grid-template-columns: 1fr; }
      canvas { height: 420px; }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="controls">
      <div>
        <h1>2-D slab explorer</h1>
        <p>Pick the secret corner, turn queries on and off, and change the accuracy width.</p>
      </div>

      <div>
        <label for="secret">true b</label>
        <select id="secret">
          <option value="1,0">(1, 0)</option>
          <option value="0,0">(0, 0)</option>
          <option value="0,1">(0, 1)</option>
          <option value="1,1">(1, 1)</option>
        </select>
      </div>

      <div>
        <div class="group-title">Queries</div>
        <label class="query-row"><span class="swatch" style="background:#e41a1c"></span><input type="checkbox" data-query="1,1" checked> q = (1, 1)</label>
        <label class="query-row"><span class="swatch" style="background:#377eb8"></span><input type="checkbox" data-query="1,0" checked> q = (1, 0)</label>
        <label class="query-row"><span class="swatch" style="background:#4daf4a"></span><input type="checkbox" data-query="0,1" checked> q = (0, 1)</label>
      </div>

      <div>
        <label for="alpha">accuracy bound alpha = <span class="readout" id="alpha-value">0.30</span></label>
        <input id="alpha" type="range" min="0" max="1" step="0.05" value="0.30">
      </div>

      <div class="stats">
        <div class="stat"><b id="active-count">3</b><p>active queries</p></div>
        <div class="stat"><b id="feasible-count">1</b><p>feasible corners</p></div>
      </div>
    </section>

    <section class="stage" aria-label="2-D slab visualization">
      <canvas id="plot" width="900" height="620"></canvas>
    </section>
  </main>

  <script>
    const colors = ["#e41a1c", "#377eb8", "#4daf4a"];
    const canvas = document.getElementById("plot");
    const ctx = canvas.getContext("2d");
    const secretEl = document.getElementById("secret");
    const alphaEl = document.getElementById("alpha");
    const alphaValueEl = document.getElementById("alpha-value");
    const activeCountEl = document.getElementById("active-count");
    const feasibleCountEl = document.getElementById("feasible-count");
    const queryEls = Array.from(document.querySelectorAll("[data-query]"));
    const corners = [[0, 0], [1, 0], [0, 1], [1, 1]];

    function parsePair(value) {
      return value.split(",").map(Number);
    }

    function dot(a, b) {
      return a.reduce((s, value, i) => s + value * b[i], 0);
    }

    function state() {
      return {
        b: parsePair(secretEl.value),
        alpha: Number(alphaEl.value),
        queries: queryEls
          .map((el, index) => ({ q: parsePair(el.dataset.query), index }))
          .filter((_, index) => queryEls[index].checked),
      };
    }

    function pt(x, y) {
      const margin = 78;
      const size = Math.min(canvas.width - margin * 2 - 120, canvas.height - margin * 2);
      const ox = margin;
      const oy = margin;
      return [ox + x * size, oy + (1 - y) * size, size, ox, oy];
    }

    function segmentFor(q, c) {
      const pts = [];
      for (const x of [0, 1]) {
        if (Math.abs(q[1]) > 1e-9) {
          const y = (c - q[0] * x) / q[1];
          if (y >= -1e-9 && y <= 1 + 1e-9) pts.push([x, y]);
        } else if (Math.abs(q[0] * x - c) < 1e-9) {
          pts.push([x, 0], [x, 1]);
        }
      }
      for (const y of [0, 1]) {
        if (Math.abs(q[0]) > 1e-9) {
          const x = (c - q[1] * y) / q[0];
          if (x >= -1e-9 && x <= 1 + 1e-9) pts.push([x, y]);
        } else if (Math.abs(q[1] * y - c) < 1e-9) {
          pts.push([0, y], [1, y]);
        }
      }
      const unique = [];
      for (const p of pts) {
        if (!unique.some(u => Math.hypot(u[0] - p[0], u[1] - p[1]) < 1e-7)) unique.push(p);
      }
      if (unique.length < 2) return null;
      let best = [unique[0], unique[1]], bestD = -1;
      for (let i = 0; i < unique.length; i++) {
        for (let j = i + 1; j < unique.length; j++) {
          const d = Math.hypot(unique[i][0] - unique[j][0], unique[i][1] - unique[j][1]);
          if (d > bestD) { best = [unique[i], unique[j]]; bestD = d; }
        }
      }
      return best;
    }

    function cornerFeasible(corner, st) {
      return st.queries.every(({ q }) => Math.abs(dot(q, corner) - dot(q, st.b)) <= st.alpha + 1e-9);
    }

    function clear() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "#fff";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    function drawFeasibleRegion(st) {
      const res = 180;
      const [,, size, ox, oy] = pt(0, 0);
      ctx.save();
      ctx.globalAlpha = 0.34;
      ctx.fillStyle = "#9ecae1";
      for (let ix = 0; ix < res; ix++) {
        for (let iy = 0; iy < res; iy++) {
          const x = (ix + 0.5) / res;
          const y = (iy + 0.5) / res;
          if (cornerFeasible([x, y], st)) {
            ctx.fillRect(ox + ix * size / res, oy + (res - iy - 1) * size / res, Math.ceil(size / res), Math.ceil(size / res));
          }
        }
      }
      ctx.restore();
    }

    function line(p1, p2, color, width = 2, dashed = false) {
      const [x1, y1] = pt(p1[0], p1[1]);
      const [x2, y2] = pt(p2[0], p2[1]);
      ctx.save();
      ctx.strokeStyle = color;
      ctx.lineWidth = width;
      if (dashed) ctx.setLineDash([8, 6]);
      ctx.beginPath();
      ctx.moveTo(x1, y1);
      ctx.lineTo(x2, y2);
      ctx.stroke();
      ctx.restore();
    }

    function drawArrow(from, to, color) {
      const [x1, y1] = pt(from[0], from[1]);
      const [x2, y2] = pt(to[0], to[1]);
      const angle = Math.atan2(y2 - y1, x2 - x1);
      ctx.save();
      ctx.strokeStyle = color;
      ctx.fillStyle = color;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(x1, y1);
      ctx.lineTo(x2, y2);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(x2, y2);
      ctx.lineTo(x2 - 10 * Math.cos(angle - Math.PI / 6), y2 - 10 * Math.sin(angle - Math.PI / 6));
      ctx.lineTo(x2 - 10 * Math.cos(angle + Math.PI / 6), y2 - 10 * Math.sin(angle + Math.PI / 6));
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }

    function draw() {
      const st = state();
      clear();
      drawFeasibleRegion(st);
      const [,, size, ox, oy] = pt(0, 0);

      ctx.strokeStyle = "#1f2933";
      ctx.lineWidth = 2;
      ctx.strokeRect(ox, oy, size, size);
      ctx.setLineDash([4, 6]);
      ctx.strokeStyle = "#9aa4af";
      line([0.5, 0], [0.5, 1], "#9aa4af", 1, true);
      line([0, 0.5], [1, 0.5], "#9aa4af", 1, true);
      ctx.setLineDash([]);

      st.queries.forEach(({ q, index }) => {
        const color = colors[index];
        const r = dot(q, st.b);
        for (const c of [r - st.alpha, r + st.alpha]) {
          const seg = segmentFor(q, c);
          if (seg) line(seg[0], seg[1], color, 2, true);
        }
        const exact = segmentFor(q, r);
        if (exact) {
          line(exact[0], exact[1], color, 3, false);
          const mid = [(exact[0][0] + exact[1][0]) / 2, (exact[0][1] + exact[1][1]) / 2];
          const norm = Math.hypot(q[0], q[1]) || 1;
          drawArrow([mid[0] - 0.08 * q[0] / norm, mid[1] - 0.08 * q[1] / norm], [mid[0] + 0.08 * q[0] / norm, mid[1] + 0.08 * q[1] / norm], color);
        }
      });

      let feasibleCorners = 0;
      for (const corner of corners) {
        const feasible = cornerFeasible(corner, st);
        if (feasible) feasibleCorners++;
        const [x, y] = pt(corner[0], corner[1]);
        ctx.beginPath();
        ctx.arc(x, y, 8, 0, Math.PI * 2);
        ctx.fillStyle = feasible ? "#111827" : "#fff";
        ctx.strokeStyle = "#111827";
        ctx.lineWidth = 2;
        ctx.fill();
        ctx.stroke();
        ctx.fillStyle = "#1f2933";
        ctx.font = "13px system-ui";
        ctx.fillText(`(${corner[0]}, ${corner[1]})`, x + 10, y - 10);
      }

      const [bx, by] = pt(st.b[0], st.b[1]);
      ctx.strokeStyle = "#7c3aed";
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.moveTo(bx - 12, by - 12);
      ctx.lineTo(bx + 12, by + 12);
      ctx.moveTo(bx + 12, by - 12);
      ctx.lineTo(bx - 12, by + 12);
      ctx.stroke();

      ctx.fillStyle = "#1f2933";
      ctx.font = "15px system-ui";
      ctx.fillText("x1", ox + size + 14, oy + size + 4);
      ctx.fillText("x2", ox - 8, oy - 16);
      ctx.font = "13px system-ui";
      ctx.fillStyle = "#5b6773";
      ctx.fillText("filled corner = feasible; open corner = eliminated", ox, oy + size + 36);

      alphaValueEl.textContent = st.alpha.toFixed(2);
      activeCountEl.textContent = String(st.queries.length);
      feasibleCountEl.textContent = String(feasibleCorners);
    }

    secretEl.addEventListener("change", draw);
    alphaEl.addEventListener("input", draw);
    queryEls.forEach(el => el.addEventListener("change", draw));
    draw();
  </script>
</body>
</html>
