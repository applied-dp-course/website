project:
  type: website
  output-dir: _site
  render:
    - "*.qmd"
    - "lectures/**/*.qmd"

# Don't re-execute unchanged notebooks on render (v4 §3).
execute:
  freeze: auto

website:
  title: "Applied Differential Privacy"
  description: "Course site — slides, interactive lectures, and notebooks."
  navbar:
    left:
      - href: index.qmd
        text: Home
      - href: schedule.qmd
        text: Schedule
      - href: syllabus.qmd
        text: Syllabus
  repo-url: https://github.com/applied-dp-course/website
  page-footer: "Built with Quarto. All computation imported from libdpy (pub_lib)."

format:
  html:
    theme: cosmo
    toc: true
  # RevealJS is the canonical slide format; pptx/beamer are secondary offline artifacts (v4 §7).
  revealjs:
    theme: white
    slide-number: true
    embed-resources: false
