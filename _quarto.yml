project:
  type: website
  output-dir: _site
  pre-render:
    - python scripts/run_site_python.py scripts/content_model.py
    - python scripts/run_site_python.py scripts/sync_content.py --phase catalog
    - python scripts/run_site_python.py scripts/build_interactives.py
    - python scripts/run_site_python.py scripts/build_animations.py
    - python scripts/run_site_python.py scripts/sync_content.py --phase gallery
  post-render:
    - python scripts/run_site_python.py scripts/clear_content_outputs.py
    - python scripts/run_site_python.py scripts/defer_wasm_embeds.py
    - python scripts/run_site_python.py scripts/assert_private_content.py
  resources:
    - "apps/**"
    - "_generated/apps/**"
    - "_generated/animations/**"
    - "content/tools/**/apps/**"
    - "content/site-posts/**/apps/**"
  render:
    - "/pages/*.qmd"
    - "content/lecture-presentations/**/*.qmd"
    - "content/blog-posts/**/*.ipynb"
    - "content/class-assignments/**/*.ipynb"
    - "content/home-assignments/**/*.ipynb"
    - "!content/class-assignments/**/solution.ipynb"
    - "!content/home-assignments/**/solution.ipynb"
    - "content/site-posts/**/index.qmd"
    - "content/tools/**/index.qmd"
    - "!authoring/**"
    - "!dev/**"

# Don't re-execute unchanged notebooks on render (v4 §3).
execute:
  freeze: auto

website:
  title: "Applied Differential Privacy"
  description: "Course site — slides, interactive lectures, and notebooks."
  navbar:
    left:
      - href: pages/index.qmd
        text: Home
      - href: pages/schedule.qmd
        text: Schedule
      - href: pages/lectures.qmd
        text: Lectures
      - href: pages/assignments.qmd
        text: Assignments
      - href: pages/tools.qmd
        text: Tools
      - href: pages/blog.qmd
        text: Blog
    right:
      - text: Course
        menu:
          - href: pages/syllabus.qmd
            text: Syllabus
          - href: pages/archive.qmd
            text: Archive
          - href: pages/about.qmd
            text: About
  repo-url: https://github.com/applied-dp-course/website
  page-footer: "Built with Quarto. All computation imported from libdpy (pub_lib)."

# Project-level format is HTML only. The reconstruction deck declares `format: revealjs` in its
# own front matter — declaring revealjs here too would render every page to BOTH formats and
# collide on index.html during the output-dir move (RevealJS is canonical for slides; v4 §7).
format:
  html:
    theme: [cosmo, theme/custom.scss]
    toc: true
